<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS//OS v8 — Sujit Murari Analytics Terminal</title>
<meta name="description" content="NEXUS//OS v8 — Analytics Intelligence Terminal by Sujit Murari. Data Analyst · SQL · Python · Tableau · BI.">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- Styles -->
<style>
/* ═══════════════════════════════════════════════════
   NEXUS//OS v8 — CYBERPUNK STYLESHEET
   Author: Sujit Murari
═══════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap');

/* ── VARIABLES ── */
:root {
  --bg-void:     #020408;
  --bg-deep:     #050c14;
  --bg-panel:    #080f1a;
  --bg-card:     #0a1525;
  --bg-hover:    #0d1e35;

  --cyan:        #00e5ff;
  --cyan-dim:    #00a8c0;
  --cyan-glow:   rgba(0,229,255,0.15);
  --magenta:     #ff0090;
  --magenta-dim: #c0006a;
  --magenta-glow:rgba(255,0,144,0.15);
  --green:       #00ff88;
  --orange:      #ff6b00;
  --yellow:      #ffe000;
  --white:       #e0f0ff;
  --muted:       #3a5a7a;
  --muted-light: #5a7a9a;

  --border:      rgba(0,229,255,0.2);
  --border-hot:  rgba(0,229,255,0.6);

  --font-head:   'Orbitron', monospace;
  --font-mono:   'JetBrains Mono', monospace;

  --glow-cyan:   0 0 8px rgba(0,229,255,0.8), 0 0 24px rgba(0,229,255,0.3);
  --glow-mag:    0 0 8px rgba(255,0,144,0.8), 0 0 24px rgba(255,0,144,0.3);
  --glow-panel:  0 0 30px rgba(0,229,255,0.08), inset 0 0 30px rgba(0,0,0,0.5);

  --taskbar-h:   48px;
  --title-h:     32px;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: var(--font-mono);
  background: var(--bg-void);
  color: var(--white);
  user-select: none;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

/* ════════════════════════════════════════
   BOOT SCREEN
════════════════════════════════════════ */
#boot-screen {
  position: fixed; inset: 0;
  background: var(--bg-void);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity .8s ease;
}
#boot-screen.fade-out { opacity: 0; pointer-events: none; }

.boot-logo {
  font-family: var(--font-head);
  font-size: clamp(24px, 5vw, 52px);
  font-weight: 900;
  color: var(--cyan);
  text-shadow: var(--glow-cyan);
  letter-spacing: 6px;
  margin-bottom: 8px;
  animation: flicker 2s infinite;
}

.boot-version {
  font-size: 11px; letter-spacing: 4px;
  color: var(--magenta);
  text-shadow: var(--glow-mag);
  margin-bottom: 48px;
}

.boot-log-container {
  width: min(600px, 90vw);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 28px;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: var(--glow-panel);
}

.boot-log-line {
  font-size: 12px;
  line-height: 1.9;
  color: var(--cyan-dim);
  opacity: 0;
  animation: bootLineIn .3s ease forwards;
}
.boot-log-line .prefix { color: var(--green); }
.boot-log-line .ok     { color: var(--green); margin-left: 8px; }
.boot-log-line .warn   { color: var(--orange); }
.boot-log-line .err    { color: var(--magenta); }

.boot-progress-wrap {
  width: min(600px, 90vw);
  height: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.boot-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  width: 0%;
  transition: width .4s ease;
  box-shadow: var(--glow-cyan);
}
.boot-progress-text {
  text-align: center;
  margin-top: 10px;
  font-size: 11px;
  color: var(--muted-light);
  letter-spacing: 3px;
}

/* ════════════════════════════════════════
   DESKTOP
════════════════════════════════════════ */
#desktop {
  position: fixed; inset: 0 0 var(--taskbar-h) 0;
  overflow: hidden;
  display: none;
}

/* GRID OVERLAY */
#desktop::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* SCANLINES */
#desktop::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none; z-index: 1;
}

/* ── DESKTOP ICONS ── */
#desktop-icons {
  position: absolute; inset: 0;
  padding: 20px; z-index: 2;
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 8px;
}

.desktop-icon {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 10px; cursor: pointer;
  width: 80px; text-align: center;
  border: 1px solid transparent;
  transition: border-color .2s, background .2s;
}
.desktop-icon:hover {
  border-color: var(--border);
  background: var(--cyan-glow);
}
.desktop-icon .icon-img { font-size: 28px; }
.desktop-icon .icon-label {
  font-size: 9px; letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--cyan-dim);
  line-height: 1.3;
}

/* ── PARTICLE CANVAS ── */
#particle-canvas {
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ════════════════════════════════════════
   WINDOWS
════════════════════════════════════════ */
.os-window {
  position: absolute;
  min-width: 320px; min-height: 200px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  box-shadow: var(--glow-panel), 0 20px 60px rgba(0,0,0,0.7);
  display: flex; flex-direction: column;
  z-index: 10;
  transition: box-shadow .2s;
  overflow: hidden;
}
.os-window.active-window {
  border-color: var(--border-hot);
  box-shadow: var(--glow-cyan), 0 20px 60px rgba(0,0,0,0.8);
  z-index: 20;
}
.os-window.minimized { display: none; }
.os-window.maximized {
  inset: 0 !important;
  width: 100% !important;
  height: calc(100% ) !important;
  border-radius: 0;
}

.window-titlebar {
  height: var(--title-h);
  background: linear-gradient(90deg, var(--bg-card), var(--bg-deep));
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 10px; gap: 10px;
  cursor: grab; flex-shrink: 0;
  user-select: none;
}
.window-titlebar:active { cursor: grabbing; }

.window-title-icon { font-size: 14px; }
.window-title-text {
  font-family: var(--font-head);
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px; color: var(--cyan);
  text-shadow: var(--glow-cyan);
  flex: 1;
}
.window-controls { display: flex; gap: 6px; }
.win-btn {
  width: 16px; height: 16px;
  border: 1px solid;
  cursor: pointer; font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
  background: transparent;
  color: inherit;
  font-family: var(--font-mono);
}
.win-btn.close   { border-color: var(--magenta); color: var(--magenta); }
.win-btn.min     { border-color: var(--yellow);  color: var(--yellow); }
.win-btn.max     { border-color: var(--cyan);    color: var(--cyan); }
.win-btn.close:hover   { background: var(--magenta); color: #000; }
.win-btn.min:hover     { background: var(--yellow);  color: #000; }
.win-btn.max:hover     { background: var(--cyan);     color: #000; }

.window-body {
  flex: 1; overflow: auto;
  padding: 16px;
  position: relative;
}

.resize-handle {
  position: absolute; right: 0; bottom: 0;
  width: 16px; height: 16px; cursor: nwse-resize;
  z-index: 10;
}
.resize-handle::after {
  content: '⋱';
  position: absolute; right: 3px; bottom: 0;
  font-size: 14px; color: var(--muted);
}

/* ════════════════════════════════════════
   TASKBAR
════════════════════════════════════════ */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--taskbar-h);
  background: rgba(5,12,20,0.95);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  display: flex; align-items: center;
  padding: 0 12px; gap: 8px;
  z-index: 1000;
}

.taskbar-brand {
  font-family: var(--font-head);
  font-size: 10px; font-weight: 900;
  color: var(--cyan); letter-spacing: 2px;
  text-shadow: var(--glow-cyan);
  margin-right: 8px; padding-right: 12px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}

.taskbar-app {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; cursor: pointer;
  border: 1px solid transparent;
  font-size: 10px; letter-spacing: 1px;
  color: var(--muted-light);
  transition: all .2s;
  white-space: nowrap;
}
.taskbar-app:hover, .taskbar-app.open {
  border-color: var(--border);
  color: var(--cyan);
  background: var(--cyan-glow);
}
.taskbar-app .app-icon { font-size: 12px; }

.taskbar-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 12px;
}
.taskbar-clock {
  font-family: var(--font-head);
  font-size: 10px; color: var(--cyan-dim);
  letter-spacing: 1px;
}
.taskbar-status-dots { display: flex; gap: 4px; }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: dotPulse 2s infinite;
}
.status-dot:nth-child(2) { animation-delay: .4s; }
.status-dot:nth-child(3) { animation-delay: .8s; background: var(--cyan); }

/* ════════════════════════════════════════
   KPI CARDS
════════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 14px;
  position: relative;
  overflow: hidden;
  transition: border-color .3s;
}
.kpi-card:hover { border-color: var(--border-hot); }
.kpi-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
}
.kpi-label {
  font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted-light);
  margin-bottom: 8px;
}
.kpi-value {
  font-family: var(--font-head);
  font-size: 26px; font-weight: 700;
  color: var(--cyan);
  text-shadow: var(--glow-cyan);
  line-height: 1;
}
.kpi-unit { font-size: 12px; color: var(--muted-light); margin-left: 4px; }
.kpi-trend {
  font-size: 10px; margin-top: 6px;
  color: var(--green);
}
.kpi-trend.down { color: var(--magenta); }

/* ════════════════════════════════════════
   TABS
════════════════════════════════════════ */
.nx-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  overflow-x: auto;
}
.nx-tab {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 16px; cursor: pointer;
  color: var(--muted-light);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .2s, border-color .2s;
  background: none; border-top: none; border-left: none; border-right: none;
}
.nx-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.nx-tab:hover:not(.active) { color: var(--white); }

.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn .3s ease; }

/* ════════════════════════════════════════
   TERMINAL
════════════════════════════════════════ */
.terminal-output {
  background: #010509;
  border: 1px solid var(--border);
  padding: 12px;
  height: 280px; overflow-y: auto;
  font-size: 12px; line-height: 1.8;
  margin-bottom: 10px;
}
.t-line-cmd  { color: var(--cyan); }
.t-line-out  { color: var(--green); }
.t-line-err  { color: var(--magenta); }
.t-line-info { color: var(--muted-light); }
.t-line-hdr  { color: var(--yellow); font-weight: 700; }
.t-prompt    { color: var(--magenta); }

.terminal-input-row {
  display: flex; align-items: center; gap: 8px;
  background: #010509; border: 1px solid var(--border);
  padding: 8px 12px;
}
.terminal-prompt { color: var(--cyan); font-size: 12px; }
.terminal-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--white); caret-color: var(--cyan);
}

/* ════════════════════════════════════════
   SQL CONSOLE
════════════════════════════════════════ */
.sql-editor {
  background: #010509;
  border: 1px solid var(--border);
  padding: 12px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--green);
  width: 100%; height: 100px;
  resize: vertical; outline: none;
  caret-color: var(--cyan);
  line-height: 1.7;
}
.sql-results {
  margin-top: 12px;
  overflow-x: auto;
}
.sql-table {
  width: 100%; border-collapse: collapse;
  font-size: 11px;
}
.sql-table th {
  background: var(--bg-card);
  color: var(--cyan); padding: 6px 10px;
  text-align: left; font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase;
  border: 1px solid var(--border);
}
.sql-table td {
  padding: 5px 10px; border: 1px solid rgba(0,229,255,0.1);
  color: var(--white); font-size: 11px;
}
.sql-table tr:hover td { background: var(--bg-hover); }

/* ════════════════════════════════════════
   BUTTONS
════════════════════════════════════════ */
.nx-btn {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 16px; cursor: pointer;
  border: 1px solid var(--cyan);
  background: transparent; color: var(--cyan);
  transition: all .2s;
}
.nx-btn:hover {
  background: var(--cyan); color: var(--bg-void);
  box-shadow: var(--glow-cyan);
}
.nx-btn.mag {
  border-color: var(--magenta); color: var(--magenta);
}
.nx-btn.mag:hover {
  background: var(--magenta); color: var(--bg-void);
  box-shadow: var(--glow-mag);
}
.nx-btn.sm { padding: 5px 10px; font-size: 9px; }
.nx-btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }

/* ════════════════════════════════════════
   AI MODULE
════════════════════════════════════════ */
.ai-ring-container {
  display: flex; justify-content: center; margin: 10px 0;
}
.ai-ring {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid var(--cyan);
  border-top-color: var(--magenta);
  box-shadow: var(--glow-cyan);
  animation: spinRing 2s linear infinite;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.ai-ring::before {
  content: '';
  position: absolute; inset: 8px;
  border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.4);
  border-top-color: var(--magenta);
  animation: spinRing 1.4s linear infinite reverse;
}
.ai-ring-text {
  font-family: var(--font-head);
  font-size: 9px; color: var(--cyan);
  text-align: center; z-index: 1;
}

.ai-output {
  background: var(--bg-deep);
  border: 1px solid var(--border);
  padding: 14px;
  font-size: 12px; line-height: 1.8;
  color: var(--cyan-dim);
  min-height: 120px; margin-top: 12px;
  max-height: 220px; overflow-y: auto;
}
.ai-output .ai-line { margin-bottom: 4px; animation: fadeIn .3s ease; }
.ai-output .ai-key { color: var(--yellow); }
.ai-output .ai-val { color: var(--white); }

/* ════════════════════════════════════════
   PIPELINE
════════════════════════════════════════ */
.pipeline-container {
  display: flex; flex-direction: column;
  align-items: center; gap: 0; padding: 10px 0;
}
.pipeline-stage {
  width: 100%; max-width: 340px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 12px 20px;
  text-align: center;
  position: relative;
  transition: border-color .3s, box-shadow .3s;
}
.pipeline-stage.active-stage {
  border-color: var(--cyan);
  box-shadow: var(--glow-cyan);
}
.pipeline-stage .stage-name {
  font-family: var(--font-head);
  font-size: 11px; letter-spacing: 2px;
  color: var(--cyan);
}
.pipeline-stage .stage-desc {
  font-size: 10px; color: var(--muted-light); margin-top: 4px;
}
.pipeline-arrow {
  width: 2px; height: 24px;
  background: linear-gradient(var(--cyan), var(--magenta));
  margin: 0 auto;
  position: relative;
}
.pipeline-arrow::after {
  content: '▼';
  position: absolute; bottom: -12px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: var(--magenta);
}

/* ════════════════════════════════════════
   PROJECTS
════════════════════════════════════════ */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
.project-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 16px;
  cursor: pointer;
  transition: border-color .2s, transform .2s;
  position: relative; overflow: hidden;
}
.project-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  transform: scaleX(0); transform-origin: left;
  transition: transform .3s;
}
.project-card:hover::before { transform: scaleX(1); }
.project-card:hover { border-color: var(--border-hot); transform: translateY(-2px); }
.project-card-title {
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  color: var(--cyan); letter-spacing: 1px; margin-bottom: 8px;
}
.project-card-desc {
  font-size: 11px; color: var(--muted-light);
  line-height: 1.6; margin-bottom: 10px;
}
.project-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.project-tag {
  font-size: 9px; padding: 2px 8px;
  border: 1px solid var(--border); color: var(--cyan-dim);
  letter-spacing: 1px;
}
.project-link {
  font-size: 9px; color: var(--magenta);
  letter-spacing: 2px; text-transform: uppercase;
  text-decoration: none;
  transition: text-shadow .2s;
}
.project-link:hover { text-shadow: var(--glow-mag); }

/* ════════════════════════════════════════
   DATASET
════════════════════════════════════════ */
.upload-zone {
  border: 2px dashed var(--border);
  padding: 32px; text-align: center;
  cursor: pointer; transition: border-color .2s, background .2s;
  margin-bottom: 16px;
}
.upload-zone:hover {
  border-color: var(--cyan); background: var(--cyan-glow);
}
.upload-zone .upload-icon { font-size: 36px; margin-bottom: 10px; }
.upload-zone p { font-size: 12px; color: var(--muted-light); }
.upload-zone input { display: none; }

.dataset-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px; margin-bottom: 14px;
}
.dstat {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 10px; text-align: center;
}
.dstat-val {
  font-family: var(--font-head); font-size: 18px;
  color: var(--cyan); text-shadow: var(--glow-cyan);
}
.dstat-lbl { font-size: 9px; color: var(--muted-light); letter-spacing: 1px; margin-top: 2px; }

.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px; margin-top: 14px;
}
.chart-box {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 14px;
}
.chart-box-title {
  font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted-light);

function termPrint(type, text) {
  const out = document.getElementById('term-out');
  if (!out) return;
  const line = document.createElement('div');
  const cls = { cmd:'t-line-cmd', out:'t-line-out', err:'t-line-err', info:'t-line-info', hdr:'t-line-hdr' }[type] || 't-line-info';
  line.className = cls;
  line.textContent = text;
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
}

window.termCmd = function(cmd) {
  cmd = cmd.toLowerCase().trim();
  if (!cmd) return;
  termPrint('cmd', `nexus@os:~$ ${cmd}`);
  const handler = TERM_CMDS[cmd];
  if (handler) {
    const lines = handler();
    lines.forEach(([t,txt]) => termPrint(t, txt));
  } else {
    termPrint('err', `command not found: ${cmd} — type "help"`);
  }
};

function buildSQL(body) {
  body.innerHTML = `
  <div class="nx-btn-row">
    <button class="nx-btn sm" onclick="sqlRun()">▶ EXECUTE</button>

  </div>
  <textarea class="sql-editor" id="sql-editor">SELECT airline, COUNT(*) as flights, ROUND(AVG(price),0) as avg_price
FROM flights
GROUP BY airline
ORDER BY avg_price DESC
LIMIT 10;</textarea>
  <div class="sql-results" id="sql-results"></div>
  <canvas id="sql-chart" style="margin-top:14px;max-height:200px" height="180"></canvas>`;
}

const SQL_PRESETS = {
  avg:      `SELECT ROUND(AVG(price),2) as avg_price, MIN(price) as min_price, MAX(price) as max_price\nFROM flights;`,
  airline:  `SELECT airline, COUNT(*) as flights, ROUND(AVG(price),0) as avg_price\nFROM flights\nGROUP BY airline\nORDER BY avg_price DESC\nLIMIT 10;`,
  category: `SELECT category, SUM(revenue) as total_revenue, COUNT(*) as orders\nFROM ecommerce\nGROUP BY category\nORDER BY total_revenue DESC;`,
  toprev:   `SELECT airline, route, ROUND(AVG(price),0) as avg_price\nFROM flights\nGROUP BY airline, route\nORDER BY avg_price DESC\nLIMIT 8;`,
};

window.sqlPreset = function(key) {
  const el = document.getElementById('sql-editor');
  if (el) { el.value = SQL_PRESETS[key]; sqlRun(); }
};

window.sqlClear = function() {
  const res = document.getElementById('sql-results');
  if (res) res.innerHTML = '';
};

let sqlChartInst = null;
window.sqlRun = function() {
  const query = (document.getElementById('sql-editor')?.value || '').toLowerCase();
  const results = document.getElementById('sql-results');
  if (!results) return;

  // Simulated SQL results based on query keywords
  let rows = [], cols = [];

  if (query.includes('airline') && query.includes('count')) {
    cols = ['AIRLINE','FLIGHTS','AVG_PRICE'];
    rows = [['IndiGo',14820,4820],['Air India',9240,7350],['SpiceJet',7810,4650],['Vistara',5690,8920],['Go First',4320,4280],['AirAsia India',3910,4150],['Akasa Air',2140,4680],['Alliance Air',980,5320]];
  } else if (query.includes('avg(price)') || query.includes('min(price)')) {
    cols = ['AVG_PRICE','MIN_PRICE','MAX_PRICE'];
    rows = [[5847.32, 1099, 48750]];
  } else if (query.includes('category') || query.includes('revenue')) {
    cols = ['CATEGORY','TOTAL_REVENUE','ORDERS'];
    rows = [['Electronics',48920000,12840],['Fashion',31450000,28910],['Home & Kitchen',22780000,18430],['Sports',18340000,9870],['Beauty',14120000,22410],['Books',5840000,31200]];
  } else if (query.includes('route') || query.includes('toprev')) {
    cols = ['AIRLINE','ROUTE','AVG_PRICE'];
    rows = [['Vistara','DEL-BOM',9840],['Air India','BOM-LHR',48750],['Vistara','BOM-DEL',9120],['IndiGo','DEL-BLR',6240],['SpiceJet','HYD-DEL',5870],['Air India','DEL-SIN',32400],['Go First','COK-DEL',5120],['IndiGo','BLR-HYD',3840]];
  } else {
    cols = ['RESULT']; rows = [['Query executed — 0 rows matched. Try a preset query!']];
  }

  // Build table
  results.innerHTML = `
  <div class="label-xs" style="margin-bottom:6px">${rows.length} ROW${rows.length!==1?'S':''} RETURNED</div>
  <table class="sql-table">
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;

  // Chart from numeric results
  if (rows.length > 1 && cols.length >= 2 && typeof rows[0][1] === 'number') {
    setTimeout(() => {
      const ctx = document.getElementById('sql-chart');
      if (!ctx || !window.Chart) return;
      if (sqlChartInst) { sqlChartInst.destroy(); sqlChartInst = null; }
      sqlChartInst = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: rows.map(r => String(r[0]).substring(0,10)),
          datasets: [{
            label: cols[1],
            data: rows.map(r => r[1]),
            backgroundColor: 'rgba(0,229,255,0.3)',
            borderColor: '#00e5ff',
            borderWidth: 1,
          }]
        },
        options: {
          responsive:true,
          scales:{
            x:{ ticks:{color:'#5a7a9a',font:{family:'JetBrains Mono',size:9}}, grid:{color:'rgba(0,229,255,0.06)'} },
            y:{ ticks:{color:'#5a7a9a',font:{family:'JetBrains Mono',size:9}}, grid:{color:'rgba(0,229,255,0.06)'} }
          },
          plugins:{ legend:{ labels:{color:'#5a7a9a',font:{size:9}} } }
        }
      });
    }, 50);
  }
};

window.runPipeline = function() {
  const stages = document.querySelectorAll('.pipeline-stage');
  const status  = document.getElementById('pipeline-status');
  stages.forEach(s => s.classList.remove('active-stage'));
  let i = 0;
  const msgs = ['Loading data sources...','Ingesting data...','Cleaning dataset...','Running EDA...','Computing statistics...','Rendering visualizations...','Generating insights ✓'];
  const interval = setInterval(() => {
    if (i > 0) stages[i-1].classList.remove('active-stage');
    if (i >= stages.length) { clearInterval(interval); if(status) status.textContent = '✓ Pipeline complete — 300K records processed'; return; }
    stages[i].classList.add('active-stage');
    if (status) status.textContent = msgs[i] || '';
    i++;
  }, 700);
};

window.resetPipeline = function() {
  document.querySelectorAll('.pipeline-stage').forEach(s => s.classList.remove('active-stage'));
  const status = document.getElementById('pipeline-status');
  if (status) status.textContent = '';
};

    const rows = numIdxs.map(i => {
      const vals = sample.data.map(r => r[i]);
      const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
      const min = Math.min(...vals), max = Math.max(...vals);
      return `<tr><td>${sample.cols[i]}</td><td>numeric</td><td>${min}</td><td>${max}</td><td>${avg.toFixed(1)}</td></tr>`;

function processDataset(csvText, type, name) {
  const lines = csvText.trim().split('\n');

  const data = lines.slice(1,20).map(l => l.split(',').map(v => {
    v = v.trim().replace(/"/g,'');
    return isNaN(v) ? v : Number(v);
  }));
  loadSample._current = { name, cols, data };
  renderDatasetSummary({ name, cols, data });
  renderDatasetCharts({ name, cols, data });
  renderSampleTable({ name, cols, data });
  // Switch to summary
  const panels = document.querySelectorAll('.tab-panel[id^="ds-tab"]');
  const tabs   = document.querySelectorAll('#ds-tabs .nx-tab');
  tabs.forEach(t => t.classList.remove('active'));
  panels.forEach(p => p.classList.remove('active'));
  tabs[1].classList.add('active');
  panels[1].classList.add('active');
}

<script>
/* ═══════════════════════════════════════════════════
   NEXUS//OS v8 — WINDOW MANAGER & DESKTOP OS
   os.js
═══════════════════════════════════════════════════ */

window.NexusOS = (() => {
  // ── STATE ──
  let zCounter = 20;
  const openWindows = {};

  // ── CLOCK ──
  function updateClock() {
    const el = document.getElementById('taskbar-clock');
    if (!el) return;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    el.textContent = `${hh}:${mm}:${ss}`;
  }

  // ── PARTICLE SYSTEM ──
  function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = Array.from({length: 60}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      size: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.5 + 0.1,
      color: Math.random() > 0.5 ? '#00e5ff' : '#ff0090',
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fill();
      });

      // Draw connecting lines
      ctx.globalAlpha = 0.04;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i+1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 0.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  }

  // ── WINDOW MANAGEMENT ──
  function createWindow(id, title, icon, contentFn, opts = {}) {
    if (openWindows[id]) {
      focusWindow(id);
      const w = document.getElementById(id);
      if (w) w.classList.remove('minimized');
      return;
    }

    const w = document.createElement('div');
    w.className = 'os-window active-window';
    w.id = id;
    w.style.width  = (opts.width  || 720) + 'px';
    w.style.height = (opts.height || 500) + 'px';
    w.style.left = (opts.x || 80 + Math.random()*120) + 'px';
    w.style.top  = (opts.y || 60 + Math.random()*80) + 'px';
    w.style.zIndex = ++zCounter;

    w.innerHTML = `
      <div class="window-titlebar" data-winid="${id}">
        <span class="window-title-icon">${icon}</span>
        <span class="window-title-text">${title}</span>
        <div class="window-controls">
          <button class="win-btn min" title="Minimize">─</button>
          <button class="win-btn max" title="Maximize">□</button>
          <button class="win-btn close" title="Close">✕</button>
        </div>
      </div>
      <div class="window-body" id="body-${id}"></div>
      <div class="resize-handle" data-winid="${id}"></div>
    `;

    document.getElementById('desktop').appendChild(w);
    openWindows[id] = { minimized: false, maximized: false };

    // Populate body
    const body = document.getElementById(`body-${id}`);
    if (contentFn) contentFn(body);

    // Controls
    w.querySelector('.win-btn.close').onclick = () => closeWindow(id);
    w.querySelector('.win-btn.min').onclick   = () => minimizeWindow(id);
    w.querySelector('.win-btn.max').onclick   = () => toggleMaximize(id);

    // Drag
    makeDraggable(w.querySelector('.window-titlebar'), w);
    // Resize
    makeResizable(w.querySelector('.resize-handle'), w);
    // Focus on click
    w.addEventListener('mousedown', () => focusWindow(id));

    // Taskbar entry
    addTaskbarEntry(id, icon, title);

    // Animation
    w.style.opacity = '0';
    w.style.transform = 'scale(0.94)';
    w.style.transition = 'opacity .2s ease, transform .2s ease';
    requestAnimationFrame(() => {
      w.style.opacity = '1';
      w.style.transform = 'scale(1)';
    });

    return w;
  }

  function focusWindow(id) {
    document.querySelectorAll('.os-window').forEach(w => w.classList.remove('active-window'));
    const w = document.getElementById(id);
    if (w) { w.classList.add('active-window'); w.style.zIndex = ++zCounter; }
  }

  function closeWindow(id) {
    const w = document.getElementById(id);
    if (w) {
      w.style.transition = 'opacity .15s, transform .15s';
      w.style.opacity = '0'; w.style.transform = 'scale(0.92)';
      setTimeout(() => w.remove(), 160);
    }
    delete openWindows[id];
    removeTaskbarEntry(id);
  }

  function minimizeWindow(id) {
    const w = document.getElementById(id);
    if (w) w.classList.toggle('minimized');
  }

  function toggleMaximize(id) {
    const w = document.getElementById(id);
    if (!w) return;
    const state = openWindows[id];
    if (state.maximized) {
      w.classList.remove('maximized');
      w.style.width  = state.prevW; w.style.height = state.prevH;
      w.style.left   = state.prevX; w.style.top    = state.prevY;
      state.maximized = false;
    } else {
      state.prevW = w.style.width; state.prevH = w.style.height;
      state.prevX = w.style.left;  state.prevY = w.style.top;
      w.classList.add('maximized');
      state.maximized = true;
    }
  }

  function addTaskbarEntry(id, icon, title) {
    const bar = document.getElementById('taskbar-apps');
    if (!bar) return;
    const btn = document.createElement('div');
    btn.className = 'taskbar-app open'; btn.id = `tb-${id}`;
    btn.innerHTML = `<span class="app-icon">${icon}</span><span>${title.substring(0,12)}</span>`;
    btn.onclick = () => { focusWindow(id); const w = document.getElementById(id); if(w) w.classList.remove('minimized'); };
    bar.appendChild(btn);
  }

  function removeTaskbarEntry(id) {
    const el = document.getElementById(`tb-${id}`);
    if (el) el.remove();
  }

  // ── DRAG ──
  function makeDraggable(handle, win) {
    let ox, oy, sx, sy;
    handle.addEventListener('mousedown', e => {
      if (e.target.closest('.window-controls')) return;
      ox = e.clientX; oy = e.clientY;
      sx = parseInt(win.style.left)||0; sy = parseInt(win.style.top)||0;
      const onMove = e2 => {
        win.style.left = (sx + e2.clientX - ox) + 'px';
        win.style.top  = Math.max(0, sy + e2.clientY - oy) + 'px';
      };
      const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  // ── RESIZE ──
  function makeResizable(handle, win) {
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      const startX = e.clientX, startY = e.clientY;
      const startW = win.offsetWidth, startH = win.offsetHeight;
      const onMove = e2 => {
        win.style.width  = Math.max(320, startW + e2.clientX - startX) + 'px';
        win.style.height = Math.max(200, startH + e2.clientY - startY) + 'px';
      };
      const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  // ── KPI ANIMATION ──
  function animateKPIs() {
    const cards = document.querySelectorAll('.kpi-card');
    setInterval(() => {
      cards.forEach(card => {
        card.style.transition = 'border-color .5s';
        card.style.borderColor = 'rgba(0,229,255,0.5)';
        setTimeout(() => card.style.borderColor = '', 500);
      });
    }, 3000);
  }

  // ── TABS INIT ──
  function initTabs(container) {
    const tabs = container.querySelectorAll('.nx-tab');
    const panels = container.querySelectorAll('.tab-panel');
    tabs.forEach((tab, i) => {
      tab.onclick = () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        if (panels[i]) panels[i].classList.add('active');
      };
    });
  }

  // ── DESKTOP READY ──
  function onDesktopReady() {
    initParticles();
    animateKPIs();
    // Auto-open welcome window
    setTimeout(() => openApp('kpi'), 300);
    setTimeout(() => openApp('projects'), 600);
  }

  // ── APP REGISTRY ──
  const APPS = {
    dashboard:  { title: 'BI DASHBOARD CENTER',       icon: '📊', fn: buildDashboard,  w:900, h:640 },
    dataset:    { title: 'DATASET ANALYZER',           icon: '🔬', fn: buildDataset,    w:820, h:600 },
    sql:        { title: 'SQL QUERY CONSOLE',          icon: '🛢️', fn: buildSQL,        w:760, h:520 },
    ai:         { title: 'NEXUS//AI ASSISTANT',        icon: '🤖', fn: buildAI,         w:680, h:560 },
    pipeline:   { title: 'DATA PIPELINE VISUALIZER',  icon: '⚡', fn: buildPipeline,   w:460, h:580 },
    projects:   { title: 'PROJECTS DATABASE',          icon: '📁', fn: buildProjects,   w:820, h:560 },
    terminal:   { title: 'ANALYTICS TERMINAL',        icon: '💻', fn: buildTerminal,   w:700, h:460 },
    kpi:        { title: 'KPI MONITOR',               icon: '📈', fn: buildKPI,        w:760, h:420 },
    about:      { title: 'OPERATOR PROFILE',          icon: '👤', fn: buildAbout,      w:680, h:520 },
  };

  function openApp(key) {
    const app = APPS[key];
    if (!app) return;
    createWindow(key, app.title, app.icon, app.fn, { width: app.w, height: app.h });
  }

  // ── EXPOSE ──
  return { openApp, initTabs, onDesktopReady, focusWindow };
})();

function runBoot() {
  const logContainer = document.getElementById('boot-log');
  const progressBar  = document.getElementById('boot-progress');
  const progressText = document.getElementById('boot-progress-text');
  const bootScreen   = document.getElementById('boot-screen');

  let i = 0;
  const total = BOOT_LOGS.length;
  const interval = setInterval(() => {
    if (i >= total) {
      clearInterval(interval);
      progressBar.style.width = '100%';
      progressText.textContent = 'BOOT COMPLETE — LAUNCHING DESKTOP';
      setTimeout(() => {
        bootScreen.classList.add('fade-out');
        setTimeout(() => {
          bootScreen.style.display = 'none';
          document.getElementById('desktop').style.display = 'block';
          document.getElementById('taskbar').style.display = 'flex';
          if (window.NexusOS) window.NexusOS.onDesktopReady();
        }, 800);
      }, 600);
      return;
    }

    const entry = BOOT_LOGS[i];
    const line = document.createElement('div');
    line.className = 'boot-log-line';

    let prefix = '';
    let typeClass = 'text-muted';
    let suffix = '';

    if (entry.type === 'ok')   { prefix = '[  OK  ]'; typeClass = 'text-green'; }
    if (entry.type === 'warn') { prefix = '[ WARN ]'; typeClass = 'warn'; }
    if (entry.type === 'err')  { prefix = '[ FAIL ]'; typeClass = 'err'; }
    if (entry.type === 'info') { prefix = '[ INFO ]'; typeClass = ''; }
    if (entry.type === 'hdr')  { prefix = ''; typeClass = 'text-cyan'; }

    line.innerHTML = entry.type === 'hdr'
      ? `<span class="text-cyan" style="font-weight:700">${entry.text}</span>`
      : `<span class="prefix ${typeClass}">${prefix}</span> ${entry.text}`;

    logContainer.appendChild(line);
    logContainer.scrollTop = logContainer.scrollHeight;

    bootProgress = Math.round(((i + 1) / total) * 100);
    progressBar.style.width = bootProgress + '%';
    progressText.textContent = `LOADING ... ${bootProgress}%`;

    i++;
  }, 90);
}
